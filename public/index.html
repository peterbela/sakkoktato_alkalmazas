<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakkoktató alkalmazás</title>

  <style>

  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #f9f9f9;
  }

  h1 {
    color: #333;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
  }

  #response {
    margin-top: 20px;
    font-weight: bold;
    color: green;
  }

  .chessboard {
    width: 400px;
    height: 400px;
    margin: 30px auto 15px auto;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border: 3px solid #333;
  }

  .square {
    width: 100%;
    height: 100%;
    position: relative; /* a sarkokban lévő jelölésekhez KELL */
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .white {
    background-color: #f0d9b5;
  }

  .black {
    background-color: #b58863;
  }

  .square img {
    width: 80%;
    height: 80%;
    object-fit: contain;
    pointer-events: none;
  }

  /* bal felső sarok: sor (szám) – csak a bal szélső oszlop mezőin */
  .square-rank {
    position: absolute;
    top: 2px;
    left: 4px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(0, 0, 0, 0.35);
    pointer-events: none;
  }

  /* jobb alsó sarok: oszlop (betű) – csak az alsó sor mezőin */
  .square-file {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(0, 0, 0, 0.35);
    pointer-events: none;
  }

  .black .square-rank,
  .black .square-file {
    color: rgba(255, 255, 255, 0.6);
  }
  .selected-square {
  outline: 3px solid rgba(0, 0, 255, 0.7);
  outline-offset: -3px;
}

  .highlight-move {
    box-shadow: inset 0 0 0 4px rgba(0, 255, 0, 0.7);
  }

  .highlight-capture {
    box-shadow: inset 0 0 0 4px rgba(255, 0, 0, 0.8);
  }

  #lessonNav {
  margin-top: 20px;
  margin-bottom: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

#lessonNav button {
  padding: 6px 12px;
  font-size: 14px;
}

#lessonNav button.lockedLesson {
  opacity: 0.45;
  cursor: not-allowed;
  background: #eee;
  color: #777;
}

#userPanel {
  margin: 10px auto 20px auto;
  max-width: 600px;
  padding: 10px;
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 8px;
}

#usernameInput {
  padding: 8px;
  font-size: 14px;
  margin: 0 8px;
}

#currentUserText {
  margin-top: 8px;
  font-size: 14px;
  font-weight: bold;
}

#lessonTitle {
  margin-top: 10px;
  font-size: 20px;
}

#lessonBody {
  max-width: 600px;
  margin: 0 auto;
  text-align: left;
  margin-top: 10px;
  line-height: 1.5;
}

#lessonBody {
  white-space: pre-line;
}

#turnText {
  margin-top: 6px;
  font-weight: bold;
  color: #333;
}

#xpPanel {
  margin-top: 10px;
  margin-bottom: 20px;
  text-align: center;
  font-size: 14px;
}

#xpValue {
  font-weight: bold;
}

#lessonProgress {
  margin-top: 4px;
  font-size: 13px;
  color: #555;
}

#checklistBox {
  width: 300px;
  margin-top: 30px;
  padding: 15px;
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 10px;
  text-align: left;
}

#checklistBox ul {
  margin-top: 10px;
  padding-left: 20px;
  line-height: 1.5;
}

#taskBox {
  margin-top: 15px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  font-size: 14px;
}

#learningLayout {
  display: grid;
  grid-template-columns: 220px 460px 360px;
  gap: 30px;
  justify-content: center;
  align-items: flex-start;
  margin-top: 30px;
}

#lessonSidebar {
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  text-align: left;
}

#lessonSidebar h2 {
  text-align: center;
  margin-top: 0;
}

#lessonNav {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#lessonNav button {
  width: 100%;
  margin-top: 0;
  padding: 8px 10px;
  font-size: 14px;
  text-align: left;
}

#boardArea {
  text-align: center;
}

#lessonInfoPanel {
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  text-align: left;
}

#lessonInfoPanel #lessonTitle {
  margin-top: 0;
  text-align: left;
}

#lessonInfoPanel #lessonBody {
  max-width: 100%;
  margin: 10px 0;
}

#lessonInfoPanel #taskBox {
  margin-top: 15px;
  max-width: 100%;
}

#lessonInfoPanel #checklistBox {
  margin-top: 15px;
}

#taskText {
  margin-top: 4px;
}

#taskFeedback {
  margin-top: 6px;
  font-weight: bold;
}
</style>
</head>
<body>
  <h1>♟️ Sakkoktató alkalmazás</h1>

  <div id="userPanel">
  <label for="usernameInput">Felhasználónév:</label>
  <input id="usernameInput" type="text" placeholder="pl. Peti" />
  <button id="loginBtn">Belépés / folytatás</button>
  <div id="currentUserText"></div>
</div>

  <div id="xpPanel">
  <span>Össz XP: <span id="xpValue">0</span></span>
  <div id="lessonProgress"></div>
</div>

  <p>Frontend működik, és most kipróbáljuk a kapcsolatot a backenddel.</p>

  <button id="checkServer">Kapcsolat tesztelése</button>
  <div id="response"></div>

<div id="learningLayout">

  <aside id="lessonSidebar">
    <h2>Leckék</h2>

    <div id="lessonNav">
      <button data-lesson="intro">Bevezetés</button>
      <button data-lesson="board">A tábla</button>
      <button data-lesson="pawn">A gyalog</button>
      <button data-lesson="rook">A bástya</button>
      <button data-lesson="bishop">A futó</button>
      <button data-lesson="knight">A huszár</button>
      <button data-lesson="queen">A vezér</button>
      <button data-lesson="king">A király</button>
      <button data-lesson="rules">Alapszabályok</button>
    </div>
  </aside>

  <main id="boardArea">
    <h2>Sakktábla</h2>
    <div id="turnText">Világos következik.</div>

    <div id="chessboard" class="chessboard"></div>

    <button id="randomPieceBtn">🎲 Véletlen állás generálása</button>
    <button id="startPositionBtn">♟ Kezdőállás beállítása</button>
  </main>

  <aside id="lessonInfoPanel">
    <h3 id="lessonTitle"></h3>
    <p id="lessonBody"></p>

    <div id="taskBox">
      <strong>Feladat:</strong>
      <div id="taskText"></div>
      <div id="taskFeedback"></div>
    </div>

    <div id="checklistBox">
      <strong>Mielőtt lépsz, gondold végig:</strong>
      <ul id="checklist"></ul>
    </div>
  </aside>

</div>
<script src="js/pieces.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/rules.js"></script>
<script src="js/moves.js"></script>
<script src="js/board.js"></script>
<script src="script.js"></script>
</body>
</html>
