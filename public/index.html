<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakkoktató alkalmazás</title>
  <link rel="stylesheet" href="css/style.css" />  
</head>
<body>
  <h1>♟️ Sakkoktató alkalmazás</h1>

  <div id="userPanel">
  <label for="usernameInput">Felhasználónév:</label>
  <input id="usernameInput" type="text" placeholder="pl. Peti" />
  <button id="loginBtn">Belépés / folytatás</button>
  <div id="currentUserText"></div>
</div>

  <div id="xpPanel">
  <span>Össz XP: <span id="xpValue">0</span></span>
  <div id="lessonProgress"></div>
</div>

  <p>Frontend működik, és most kipróbáljuk a kapcsolatot a backenddel.</p>

  <button id="checkServer">Kapcsolat tesztelése</button>
  <div id="response"></div>

<div id="learningLayout">

  <aside id="lessonSidebar">
    <h2>Leckék</h2>

    <div id="lessonNav">
      <button data-lesson="intro">Bevezetés</button>
      <button data-lesson="board">A tábla</button>
      <button data-lesson="pawn">A gyalog</button>
      <button data-lesson="rook">A bástya</button>
      <button data-lesson="bishop">A futó</button>
      <button data-lesson="knight">A huszár</button>
      <button data-lesson="queen">A vezér</button>
      <button data-lesson="king">A király</button>
      <button data-lesson="rules">Alapszabályok</button>
    </div>
  </aside>

  <main id="boardArea">
    <h2>Sakktábla</h2>
    <div id="turnText">Világos következik.</div>

    <div id="chessboard" class="chessboard"></div>

    <button id="randomPieceBtn">🎲 Véletlen állás generálása</button>
    <button id="startPositionBtn">♟ Kezdőállás beállítása</button>
  </main>

  <aside id="lessonInfoPanel">
    <h3 id="lessonTitle"></h3>
    <p id="lessonBody"></p>

   <div id="taskBox">
  <strong>Feladat:</strong>
  <div id="taskText"></div>
  <div id="taskFeedback"></div>
  <button id="nextTaskBtn" type="button">Következő feladat</button>
</div>


    <div id="checklistBox">
      <strong>Mielőtt lépsz, gondold végig:</strong>
      <ul id="checklist"></ul>
    </div>
  </aside>

</div>
<script src="js/pieces.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/rules.js"></script>
<script src="js/moves.js"></script>
<script src="js/board.js"></script>
<script src="js/user.js"></script>
<script src="js/progress.js"></script>
<script src="js/lessons.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
